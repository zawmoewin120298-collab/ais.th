# vi:syntax=nginx
events {
  worker_connections 1024;
}

error_log stderr;

http {
  resolver 127.0.0.11 ipv6=off;
  include generic_conf/setup_logging.conf;
  include generic_conf/lua_path_setup.conf;
  include generic_conf/basic_vts_setup.conf;
  include generic_conf/setup_cache.conf;

  # =============================================
  # 1. Backend Upstream (CDN Origin)
  # =============================================
  upstream backend {
    server backend:8080;
    server backend1:8080;
    server backend1:80;
    server backend1:8880;
    server backend1:443;
    server backend1:2086;
    keepalive 10;
  }

  # =============================================
  # 2. Xray Upstream (VPN) - xray service ကိုခေါ်ပါ
  # =============================================
  upstream xray_backend {
    server xray:10001;   # 127.0.0.1 မဟုတ်ဘဲ xray သုံးပါ
    keepalive 10;
  }

  server {
    listen 8081;   # 8080 ကနေ 8081 ပြောင်းပါ

    # =============================================
    # 3. Health Check (Railway အတွက်)
    # =============================================
    location /health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }

    # =============================================
    # 4. VPN WebSocket - Xray ကို ခေါ်မယ်
    # =============================================
    location /vpn-ws {
      proxy_http_version 1.1;
      proxy_pass http://xray_backend;   # upstream ကိုသုံးပါ
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 60s;
      proxy_connect_timeout 60s;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =============================================
    # 5. CloudFront Proxy (သာမန် Web Traffic)
    # =============================================
    location / {
      proxy_ssl_server_name on;
      proxy_ssl_name www.true.th;
      proxy_ssl_verify off;
      proxy_pass https://www.true.th:443;
      proxy_set_header Host www.true.th;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_valid 200 302 10m;
      proxy_cache_valid 404 1m;
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
      proxy_next_upstream_tries 3;
    }

    include generic_conf/basic_vts_location.conf;
  }
}
