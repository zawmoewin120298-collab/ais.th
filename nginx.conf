events {
    worker_connections 1024;
}

http {
    default_type text/html;
    resolver 8.8.8.8 1.1.1.1 ipv6=off;

    # Buffer Settings (502 error အတွက်)
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    large_client_header_buffers 4 32k;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_http_version 1.1;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    upstream xray_backend {
        server 127.0.0.1:10001;
        keepalive 10;
    }

    # =============================================
    # Server 1: Port 8081 (www.true.th Proxy)
    # =============================================
    server {
        listen 8081;
        server_name www.true.th;

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location /vpn-ws {
            proxy_http_version 1.1;
            proxy_pass http://xray_backend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            resolver 8.8.8.8 1.1.1.1 ipv6=off;
            
            proxy_ssl_server_name on;
            proxy_ssl_name www.true.th;
            proxy_ssl_verify off;
            
            proxy_pass https://www.true.th:443;
            proxy_set_header Host www.true.th;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/local/openresty/nginx/html;
        }
    }

    # =============================================
    # Server 2: Port 10001 (သီးသန့် Website - index.html)
    # =============================================
    server {
        listen 10001;
        server_name localhost;

        root /usr/local/openresty/nginx/html;
        index index.html;

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        error_page 404 /404.html;
        location = /404.html {
            root /usr/local/openresty/nginx/html;
        }
    }
}
