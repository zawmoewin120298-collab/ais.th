events {
    worker_connections 1024;
}

http {
    default_type text/html;
    resolver 8.8.8.8 1.1.1.1 ipv6=off;

    # Buffer Settings
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    large_client_header_buffers 4 32k;
    proxy_cache_path /cache levels=1:2 keys_zone=zone_1:10m max_size=1g inactive=60m use_temp_path=off;

    # WebSocket Map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =============================================
    # Proxy Headers
    # =============================================
    proxy_http_version 1.1;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header User-Agent $http_user_agent;
    proxy_set_header Referer $http_referer;
    proxy_set_header Accept-Encoding $http_accept_encoding;
    proxy_set_header Accept-Language $http_accept_language;
    proxy_set_header Cache-Control $http_cache_control;
    proxy_set_header Pragma $http_pragma;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Connection "Keep-Alive";
    
    # =============================================
    # Proxy Redirect
    # =============================================
    proxy_redirect off;
    proxy_redirect http://speed.measurementlab.net/ https://speed.measurementlab.net/;
    
    # =============================================
    # Cookie Domain
    # =============================================
    proxy_cookie_domain speed.measurementlab.net $host;
    proxy_cookie_path / /;
    
    # =============================================
    # Hide Headers
    # =============================================
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    
    # =============================================
    # Ignore Headers
    # =============================================
    proxy_ignore_headers Set-Cookie Cache-Control Expires;
    
    # =============================================
    # Cache Headers
    # =============================================
    proxy_cache_key "$scheme$proxy_host$request_uri";
    proxy_cache_methods GET HEAD POST;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;

    # =============================================
    # Speed Test Backend
    # =============================================
    upstream speed_backend {
        server 151.101.65.195:443 weight=3;
        server 151.101.1.195:443 weight=3;
        server 151.101.129.195:443 weight=2;
        server 151.101.193.195:443 weight=2;
        keepalive 10;
    }

    upstream xray_backend {
        server 127.0.0.1:10001;
        keepalive 10;
    }

    # =============================================
    # Server: Port 443
    # =============================================
    server {
        listen 443;
        server_name cdn-domain-production.up.railway.app;

        # Security Headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Health Check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # VPN WebSocket (Xray)
        location /vpn-ws {
            proxy_pass http://xray_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
        }

        # Static Website
        location /website {
            alias /usr/local/openresty/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # =============================================
        # Reverse Proxy to speed.measurementlab.net
        # =============================================
        location / {
            resolver 8.8.8.8 1.1.1.1 ipv6=off;
            
            # SSL Settings
            proxy_ssl_server_name on;
            proxy_ssl_name speed.measurementlab.net;
            proxy_ssl_verify off;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # Proxy Pass (speed_backend ကိုခေါ်မယ်)
            proxy_pass https://speed_backend;
            
            # Host Headers (အရေးကြီး)
            proxy_set_header Host speed.measurementlab.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Buffer Settings
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            
            # Cache Settings
            proxy_cache zone_1;
            proxy_cache_key "$scheme$proxy_host$request_uri";
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
            
            # Error Handling
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
            
            # Timeouts
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/local/openresty/nginx/html;
        }
    }
}
