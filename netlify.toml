[build]
  command = "echo 'No build required'"
  publish = "."   # ← ဒါပဲထားပါ (အပြည့်အစုံမထည့်ပါနဲ့)

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
